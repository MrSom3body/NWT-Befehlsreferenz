name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  merge_group:

jobs:
  cheatsheet:
    name: Cheatsheet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            accept-flake-config = true
            always-allow-substitutes = true
            builders-use-substitutes = true
            max-jobs = auto

      - name: Compile Cheatsheet
        run: |
          nix run .#build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main.pdf
          path: main.pdf

  release:
    name: Release
    needs: cheatsheet
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download PDF Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$tag" \
              --generate-notes

      - name: Upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" *.pdf --repo="$GITHUB_REPOSITORY"
